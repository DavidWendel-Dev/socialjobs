# =============================================================================
# docker-compose.simple.yml — deploy simplificado do SocialJobs
# Perfeito pra começar: app + Nginx + MySQL + Redis + Queue + Scheduler
# (sem Meilisearch, sem Reverb). Depois é só migrar pro compose completo.
# =============================================================================

x-app-build: &app_build
  context: .
  dockerfile: docker/php/Dockerfile
  target: runtime

x-app-env: &app_env
  env_file:
    - .env
  environment:
    TZ: America/Sao_Paulo

x-app-volumes: &app_volumes
  - ./:/var/www
  - /var/www/vendor
  - /var/www/node_modules

services:
  app:
    build: *app_build
    image: socialjobs/app:latest
    container_name: socialjobs_app
    restart: unless-stopped
    <<: *app_env
    volumes: *app_volumes
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [socialjobs_net]
    expose: ["9000"]

  nginx:
    image: nginx:1.27-alpine
    container_name: socialjobs_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.simple.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on: [app]
    networks: [socialjobs_net]

  mysql:
    image: mysql:8.4
    container_name: socialjobs_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
      TZ: America/Sao_Paulo
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=512M
    volumes:
      - mysql_data:/var/lib/mysql
    networks: [socialjobs_net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-${DB_PASSWORD}}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: socialjobs_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [socialjobs_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  queue:
    build: *app_build
    image: socialjobs/app:latest
    container_name: socialjobs_queue
    restart: unless-stopped
    <<: *app_env
    environment:
      SKIP_LARAVEL_CACHE: "true"
      TZ: America/Sao_Paulo
    command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--sleep=1", "--max-jobs=1000", "--max-time=3600"]
    volumes: *app_volumes
    depends_on:
      - app
      - redis
    networks: [socialjobs_net]

  scheduler:
    build: *app_build
    image: socialjobs/app:latest
    container_name: socialjobs_scheduler
    restart: unless-stopped
    <<: *app_env
    environment:
      SKIP_LARAVEL_CACHE: "true"
      TZ: America/Sao_Paulo
    command: ["php", "artisan", "schedule:work"]
    volumes: *app_volumes
    depends_on: [app]
    networks: [socialjobs_net]

volumes:
  mysql_data:
    name: socialjobs_mysql_data
  redis_data:
    name: socialjobs_redis_data
  nginx_cache:
    name: socialjobs_nginx_cache

networks:
  socialjobs_net:
    name: socialjobs_net
    driver: bridge
