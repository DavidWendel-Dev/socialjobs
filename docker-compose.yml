# =============================================================================
# docker-compose.yml — SocialJobs (produção)
# Uso: cp .env.docker .env && docker compose up -d
# =============================================================================

x-app-build: &app_build
  context: .
  dockerfile: docker/php/Dockerfile
  target: runtime

x-app-env: &app_env
  env_file:
    - .env
  environment:
    TZ: America/Sao_Paulo

x-app-volumes: &app_volumes
  - ./storage:/var/www/storage
  - ./bootstrap/cache:/var/www/bootstrap/cache

services:
  # ---------------------------------------------------------------------------
  # PHP-FPM (aplicação principal)
  # ---------------------------------------------------------------------------
  app:
    build: *app_build
    image: socialjobs/app:latest
    container_name: socialjobs_app
    restart: unless-stopped
    <<: *app_env
    volumes: *app_volumes
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - socialjobs_net
    expose:
      - "9000"

  # ---------------------------------------------------------------------------
  # Nginx (reverse proxy / TLS termination)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: socialjobs_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certbot:/etc/letsencrypt
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - socialjobs_net

  # ---------------------------------------------------------------------------
  # MySQL 8.4
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: socialjobs_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
      TZ: America/Sao_Paulo
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=512M
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - socialjobs_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-${DB_PASSWORD}}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis 7 (cache, session, queue, broadcasting)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: socialjobs_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - socialjobs_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MeiliSearch (Laravel Scout)
  # ---------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: socialjobs_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    networks:
      - socialjobs_net
    expose:
      - "7700"

  # ---------------------------------------------------------------------------
  # Reverb (WebSocket dedicado)
  # ---------------------------------------------------------------------------
  reverb:
    build: *app_build
    image: socialjobs/app:latest
    container_name: socialjobs_reverb
    restart: unless-stopped
    <<: *app_env
    environment:
      REVERB_ENABLED: "true"
      SKIP_LARAVEL_CACHE: "true"
      TZ: America/Sao_Paulo
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    volumes: *app_volumes
    depends_on:
      - app
      - redis
    networks:
      - socialjobs_net
    expose:
      - "8080"

  # ---------------------------------------------------------------------------
  # Queue worker (fila Redis)
  # ---------------------------------------------------------------------------
  queue:
    build: *app_build
    image: socialjobs/app:latest
    container_name: socialjobs_queue
    restart: unless-stopped
    <<: *app_env
    environment:
      SKIP_LARAVEL_CACHE: "true"
      TZ: America/Sao_Paulo
    command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--sleep=1", "--max-jobs=1000", "--max-time=3600"]
    volumes: *app_volumes
    depends_on:
      - app
      - redis
    networks:
      - socialjobs_net

  # ---------------------------------------------------------------------------
  # Scheduler (cron do Laravel)
  # ---------------------------------------------------------------------------
  scheduler:
    build: *app_build
    image: socialjobs/app:latest
    container_name: socialjobs_scheduler
    restart: unless-stopped
    <<: *app_env
    environment:
      SKIP_LARAVEL_CACHE: "true"
      TZ: America/Sao_Paulo
    command: ["php", "artisan", "schedule:work"]
    volumes: *app_volumes
    depends_on:
      - app
    networks:
      - socialjobs_net

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  mysql_data:
    name: socialjobs_mysql_data
  redis_data:
    name: socialjobs_redis_data
  meili_data:
    name: socialjobs_meili_data
  nginx_cache:
    name: socialjobs_nginx_cache

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  socialjobs_net:
    name: socialjobs_net
    driver: bridge
