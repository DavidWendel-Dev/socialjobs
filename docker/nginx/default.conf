# =============================================================================
# default.conf — SocialJobs (server blocks)
#
# Substitua "example.com" pelo seu domínio real antes do deploy.
# Se você não usar Reverb, remova os blocos ws.example.com.
# =============================================================================

# ---- Upstream FPM -----------------------------------------------------------
upstream php_fpm {
    server app:9000;
    keepalive 32;
}

upstream reverb_ws {
    server reverb:8080;
    keepalive 32;
}

# ---- Cabeçalhos de segurança compartilhados --------------------------------
map $sent_http_content_type $ctype_csp {
    default "";
    ~text/html "default-src 'self'; base-uri 'self'; form-action 'self';";
}

# ---- Redirect www → apex (HTTP + HTTPS) ------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name www.example.com;
    return 301 https://example.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    return 301 https://example.com$request_uri;
}

# ---- HTTP → HTTPS (apex) ----------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # ACME challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS principal — example.com
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    root  /var/www/public;
    index index.php index.html;

    charset utf-8;

    # ---- TLS ----------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ---- Cabeçalhos de segurança -------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(self), interest-cohort=()" always;
    add_header X-XSS-Protection "0" always;

    # ---- Robots / favicon ---------------------------------------------------
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ---- Assets estáticos (30 dias) ----------------------------------------
    location ~* \.(?:css|js|mjs|map|jpg|jpeg|png|gif|ico|webp|avif|svg|woff2?|ttf|eot|otf)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # ---- Uploads públicos (storage) ----------------------------------------
    location /storage {
        alias /var/www/storage/app/public;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri $uri/ =404;
    }

    # ---- Assets do Vite -----------------------------------------------------
    location /build {
        alias /var/www/public/build;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri $uri/ =404;
    }

    # ---- Rate limit em rotas de auth ---------------------------------------
    location ~ ^/(login|register|password) {
        limit_req zone=login_zone burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---- Rate limit em /api ------------------------------------------------
    location /api {
        limit_req zone=api_zone burst=60 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---- Front controller Laravel ------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---- PHP-FPM -----------------------------------------------------------
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ---- Bloqueios ---------------------------------------------------------
    location ~ /\.(?!well-known).* { deny all; }
    location ~ /(vendor|storage|bootstrap|tests|database|config|routes|app)(/|$) { deny all; }
}

# =============================================================================
# WebSocket — ws.example.com (Laravel Reverb)
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name ws.example.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ws.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://reverb_ws;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}
