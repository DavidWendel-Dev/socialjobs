# =============================================================================
# default.conf — SocialJobs (produção via IP, sem SSL/domínio ainda)
# Depois que você tiver o domínio + certbot, troca por outro config com SSL.
# =============================================================================

upstream php_fpm {
    server app:9000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root  /var/www/public;
    index index.php index.html;
    charset utf-8;

    # Uploads de até 80MB (avatares, capas, mídia de posts)
    # Deve casar com upload_max_filesize/post_max_size do PHP
    client_max_body_size 80M;

    # Headers de segurança básicos
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Livewire — precisa passar pelo PHP mesmo com extensão .js
    # (senão a regex de assets estáticos abaixo captura livewire.min.js e devolve 404).
    # O prefixo `^~` faz esse location ter prioridade sobre qualquer regex location.
    location ^~ /livewire/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Assets estáticos (30 dias de cache)
    location ~* \.(?:css|js|mjs|map|jpg|jpeg|png|gif|ico|webp|avif|svg|woff2?|ttf|eot|otf)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Uploads públicos
    location /storage {
        alias /var/www/storage/app/public;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri $uri/ =404;
    }

    # Assets do Vite
    location /build {
        alias /var/www/public/build;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri $uri/ =404;
    }

    # Rate limit em rotas de auth
    location ~ ^/(login|register|password) {
        limit_req zone=login_zone burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Rate limit em /api
    location /api {
        limit_req zone=api_zone burst=60 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Propaga esquema/host originais vindos do Cloudflare pro PHP.
        # Combinado com trustProxies do Laravel, faz request()->isSecure() = true
        # quando o visitante acessa via HTTPS na Cloudflare (mesmo com backend HTTP).
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for   if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host  if_not_empty;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Bloqueios
    location ~ /\.(?!well-known).* { deny all; }
    location ~ /(vendor|storage|bootstrap|tests|database|config|routes|app)(/|$) { deny all; }
}
