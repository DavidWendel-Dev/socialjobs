; ============================================================================
; opcache.ini — Otimização de opcode caching + preload
; ============================================================================
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
opcache.jit = tracing
opcache.jit_buffer_size = 128M
; Preload desabilitado — o bind mount do compose sobrescreve /var/www/preload.php.
; Se quiser reativar, remova o bind volume e volte a copiar o preload.php via Dockerfile.
; opcache.preload = /var/www/preload.php
; opcache.preload_user = www-data
