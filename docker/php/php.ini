; ============================================================================
; php.ini — overrides para o container SocialJobs
; ============================================================================
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 80M
max_execution_time = 120
max_input_time = 120
max_input_vars = 5000
date.timezone = America/Sao_Paulo
expose_php = Off
display_errors = Off
log_errors = On
error_log = /dev/stderr
