; ============================================================================
; supervisord.conf — SocialJobs
;
; Orquestra PHP-FPM, workers de fila, scheduler e (opcional) Reverb dentro
; do mesmo container quando `USE_SUPERVISOR=true`. Em produção usamos
; contêineres dedicados via docker-compose; este arquivo serve como
; fallback single-container e como referência.
; ============================================================================

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

; -----------------------------------------------------------------------------
; PHP-FPM em foreground
; -----------------------------------------------------------------------------
[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=www-data

; -----------------------------------------------------------------------------
; Queue workers (2 processos)
; -----------------------------------------------------------------------------
[program:queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/artisan queue:work redis --tries=3 --sleep=1 --max-jobs=1000 --max-time=3600
autostart=true
autorestart=true
numprocs=2
priority=10
stopwaitsecs=3600
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=www-data

; -----------------------------------------------------------------------------
; Scheduler (cron gerenciado pelo Laravel)
; -----------------------------------------------------------------------------
[program:scheduler]
command=php /var/www/artisan schedule:work
autostart=true
autorestart=true
priority=15
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=www-data

; -----------------------------------------------------------------------------
; Reverb (WebSocket) — só ativa quando REVERB_ENABLED=true
; (para o container dedicado `reverb`)
; -----------------------------------------------------------------------------
[program:reverb]
command=php /var/www/artisan reverb:start --host=0.0.0.0 --port=8080
autostart=%(ENV_REVERB_ENABLED)s
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=www-data
